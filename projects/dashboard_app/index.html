<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body { margin: 0; font-family: Arial; background: #0f172a; color: white; }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    aside { background: #111827; padding: 24px; }
    main { padding: 32px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card { background: #1f2937; border-radius: 16px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .big { font-size: 32px; font-weight: 800; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h2>Dashboard</h2>
      <p>Overview</p>
      <p>Users</p>
      <p>Settings</p>
    </aside>
    <main>
      <h1>Analytics Dashboard</h1>
      <div class="cards">
        <div class="card"><div>Total Users</div><div class="big">1,240</div></div>
        <div class="card"><div>Revenue</div><div class="big">$8,420</div></div>
        <div class="card"><div>Projects</div><div class="big">38</div></div>
      </div>
    </main>
  </div>
</body>
</html>
